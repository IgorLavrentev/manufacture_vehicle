services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${PG_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}

    ports:
      - "5433:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: